services:

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: calendaruser
      POSTGRES_PASSWORD: calendarpass
      POSTGRES_DB: calendardb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendaruser -d calendardb"]
      interval: 2s
      timeout: 2s
      retries: 15

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://calendaruser:calendarpass@db:5432/calendardb
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
